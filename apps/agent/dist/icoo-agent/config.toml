# Agent project defaults.
# Priority: defaults < config.toml < env < CLI args < explicit overrides

mode = "interactive"
model = "gpt-4.1-mini"
base_url = "https://api.openai.com/v1"
approval = "on-request"
max_turns = 12
max_files = 24
max_total_bytes = 32768
stream_final_answer = true
agent_name = "icoo_agents"

# Project-local runtime state defaults.
session_dir = "./.agents/sessions"
log_path = "./.agents/agent.log"
